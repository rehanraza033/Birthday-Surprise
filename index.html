<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Saniya ❤️</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="css/animations.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<!-- ================= LOADER ================= -->

<div id="loader">

    <div class="loaderBox">

        <h1>J.A.R.V.I.S</h1>

        <p id="loadingText">
            Connecting To Universe...
        </p>

        <div class="progress">

            <div id="progressBar"></div>

        </div>

    </div>

</div>

<!-- ================= GALAXY ================= -->

<section id="galaxy">

    <canvas id="space"></canvas>

    <div class="overlay">

        <h1 id="mainTitle">
            The Universe Has A Surprise
        </h1>

        <p>
            For Someone Special...
        </p>

        <button id="startButton">
            Begin Journey
        </button>

    </div>

</section>

<!-- ================= EARTH ================= -->

<section id="earth">

<div id="earthContainer"></div>

</section>

<!-- ================= DESTINATION ================= -->

<!-- ================= DESTINATION ================= -->

<section id="destination">

    <h1 id="targetTitle">TARGET LOCKED</h1>

    <h2 id="targetName">SANIYA ❤️</h2>

    <p id="targetLocation">
        Faridpur • Bareilly • Uttar Pradesh
    </p>

</section>

<!-- ================= BIRTHDAY ================= -->

<section id="birthday">

<h1>🎉 Happy Birthday 🎉</h1>

<h2>Saniya ❤️</h2>

<button id="giftButton">

Open Surprise

</button>

</section>

<!-- ================= GALLERY ================= -->

<section id="gallery">

<h1>Beautiful Memories</h1>

<div class="photoGrid">

<img src="assets/photos/1.jpg">
<img src="assets/photos/2.jpg">
<img src="assets/photos/3.jpg">
<img src="assets/photos/4.jpg">
<img src="assets/photos/5.jpg">
<img src="assets/photos/6.jpg">

</div>

</section>

<!-- ================= LETTER ================= -->

<section id="letter">

<h1>For You ❤️</h1>

<p id="typing"></p>

</section>

<script src="js/galaxy.js"></script>
<script src="js/earth.js"></script>
<script src="js/particles.js"></script>
<script src="script.js"></script>


</body>

</html>
